name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: tyled
            archive: tyled-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tyled.exe
            archive: tyled-windows-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: tyled
            archive: tyled-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # clang + lld required by .cargo/config.toml linker config
          sudo apt-get install -y clang lld libudev-dev libxkbcommon-dev libwayland-dev libasound2-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp -r assets dist/
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp -r assets dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp -r assets dist/
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  build-wasm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install wasm-bindgen-cli
        run: |
          WBG_VERSION=$(cargo metadata --format-version 1 --filter-platform wasm32-unknown-unknown \
            | jq -r '[.packages[] | select(.name == "wasm-bindgen") | .version] | max')
          cargo install wasm-bindgen-cli --version "$WBG_VERSION" --locked

      - name: Post-process with wasm-bindgen
        run: |
          wasm-bindgen --no-typescript --out-dir wasm-out --target web \
            target/wasm32-unknown-unknown/release/tyled.wasm

      - name: Bundle web release
        run: |
          cp -r assets wasm-out/
          cp web/index.html wasm-out/
          cd wasm-out && zip -r ../tyled-web.zip .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: tyled-web.zip
          path: tyled-web.zip

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wasm-out/

  release:
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "tyled-*"
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip

  deploy-pages:
    needs: build-wasm
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
