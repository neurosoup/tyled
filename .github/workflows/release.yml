name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: tyled
            archive: tyled-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tyled.exe
            archive: tyled-windows-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: tyled
            archive: tyled-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # clang + lld required by .cargo/config.toml linker config
          sudo apt-get install -y clang lld libudev-dev libxkbcommon-dev libwayland-dev libasound2-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp -r assets dist/
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp -r assets dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp -r assets dist/
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
