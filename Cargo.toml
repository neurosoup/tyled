[package]
name = "tyled"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.17.3", features = ["dynamic_linking", "file_watcher"] }
bevy_ecs_ldtk = "0.13.0"
bevy_tweening = "0.14.0"
leafwing-input-manager = {version = "0.19.0", features = ["timing"]}

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3
